<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>即時聊天室</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg: #0d0f14; --bg2: #13161e; --bg3: #1a1e2a;
    --border: #252a38; --accent: #5b6af0; --accent2: #7c89ff;
    --accent-glow: rgba(91,106,240,0.18);
    --text: #e8eaf2; --muted: #6b7394; --muted2: #3d4260;
    --online: #3dd68c; --danger: #f06292;
    --font: 'Noto Sans TC', sans-serif; --mono: 'JetBrains Mono', monospace;
    --radius: 14px; --radius-sm: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; }
  body { font-family: var(--font); background: var(--bg); color: var(--text); display: flex; height: 100vh; }

  /* ── 登入 ── */
  #login-screen { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 100; }
  .login-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 20px; padding: 48px 44px; width: 380px; box-shadow: 0 0 60px rgba(91,106,240,0.08); }
  .login-logo { width: 44px; height: 44px; background: var(--accent); border-radius: 12px; display: flex; align-items: center; justify-content: center; margin-bottom: 24px; }
  .login-logo svg { width: 22px; height: 22px; fill: #fff; }
  .login-card h1 { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
  .login-card p { font-size: 13px; color: var(--muted); margin-bottom: 32px; }
  .field { margin-bottom: 16px; }
  .field label { display: block; font-size: 12px; font-weight: 500; color: var(--muted); margin-bottom: 8px; letter-spacing: .04em; text-transform: uppercase; }
  .field input { width: 100%; background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 11px 14px; font-size: 14px; font-family: var(--font); color: var(--text); outline: none; transition: border-color .2s; }
  .field input:focus { border-color: var(--accent); }
  .btn-primary { width: 100%; background: var(--accent); color: #fff; border: none; border-radius: var(--radius-sm); padding: 12px; font-size: 14px; font-weight: 600; font-family: var(--font); cursor: pointer; transition: background .2s; margin-top: 8px; }
  .btn-primary:hover { background: var(--accent2); }

  /* ── 主畫面 ── */
  #app { display: none; width: 100%; height: 100%; }
  #app.show { display: flex; }

  /* ── 側欄 ── */
  .sidebar { width: 260px; min-width: 260px; background: var(--bg2); border-right: 1px solid var(--border); display: flex; flex-direction: column; height: 100%; }
  .sidebar-header { padding: 20px 20px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; }
  .sidebar-logo { width: 32px; height: 32px; background: var(--accent); border-radius: 9px; display: flex; align-items: center; justify-content: center; }
  .sidebar-logo svg { width: 16px; height: 16px; fill: #fff; }
  .sidebar-title { font-size: 15px; font-weight: 700; flex: 1; }
  .sidebar-section { padding: 16px 12px 8px; font-size: 11px; font-weight: 600; color: var(--muted); letter-spacing: .08em; text-transform: uppercase; display: flex; align-items: center; justify-content: space-between; }
  .add-room-btn { background: none; border: none; color: var(--muted); cursor: pointer; width: 22px; height: 22px; border-radius: 6px; display: flex; align-items: center; justify-content: center; transition: color .2s, background .2s; font-size: 20px; line-height: 1; padding-bottom: 2px; }
  .add-room-btn:hover { color: var(--accent2); background: var(--accent-glow); }
  .room-item { margin: 2px 8px; padding: 10px 12px; border-radius: var(--radius-sm); cursor: pointer; display: flex; align-items: center; gap: 8px; transition: background .15s; font-size: 14px; }
  .room-item:hover { background: var(--bg3); }
  .room-item.active { background: var(--accent-glow); color: var(--accent2); }
  .room-hash { color: var(--muted); font-size: 16px; font-weight: 300; }
  .room-item.active .room-hash { color: var(--accent2); }
  .room-lock { font-size: 12px; margin-left: auto; }
  .sidebar-footer { margin-top: auto; border-top: 1px solid var(--border); padding: 14px 16px; display: flex; align-items: center; gap: 10px; }
  .avatar { width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; flex-shrink: 0; position: relative; }
  .avatar::after { content: ''; position: absolute; bottom: 1px; right: 1px; width: 9px; height: 9px; border-radius: 50%; background: var(--online); border: 2px solid var(--bg2); }
  .user-name { font-size: 13px; font-weight: 500; }
  .user-tag { font-size: 11px; color: var(--muted); }
  .logout-btn { margin-left: auto; background: none; border: none; color: var(--muted); cursor: pointer; padding: 4px; border-radius: 6px; transition: color .2s; display: flex; }
  .logout-btn:hover { color: var(--danger); }

  /* ── 聊天區 ── */
  .chat-area { flex: 1; display: flex; flex-direction: column; height: 100%; overflow: hidden; }
  .chat-header { padding: 18px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; background: var(--bg); }
  .chat-header-hash { font-size: 20px; color: var(--muted); font-weight: 300; }
  .chat-header-name { font-size: 16px; font-weight: 600; }
  .messages { flex: 1; overflow-y: auto; padding: 24px 24px 8px; display: flex; flex-direction: column; gap: 2px; scroll-behavior: smooth; }
  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-thumb { background: var(--muted2); border-radius: 4px; }
  .msg-row { display: flex; gap: 12px; padding: 3px 0; animation: fadeIn .2s ease; }
  .msg-avatar { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; flex-shrink: 0; align-self: flex-start; margin-top: 2px; }
  .msg-body { flex: 1; }
  .msg-header { display: flex; align-items: baseline; gap: 10px; margin-bottom: 4px; }
  .msg-name { font-size: 14px; font-weight: 600; }
  .msg-name.is-me { color: var(--accent2); }
  .msg-time { font-size: 11px; color: var(--muted); font-family: var(--mono); }
  .msg-text { font-size: 14px; line-height: 1.65; color: var(--text); word-break: break-word; }
  .msg-image { max-width: 280px; max-height: 280px; border-radius: 10px; margin-top: 6px; cursor: zoom-in; display: block; object-fit: cover; border: 1px solid var(--border); }
  .msg-file { display: inline-flex; align-items: center; gap: 8px; background: var(--bg3); border: 1px solid var(--border); border-radius: 10px; padding: 10px 14px; margin-top: 6px; text-decoration: none; color: var(--text); font-size: 13px; transition: border-color .2s; }
  .msg-file:hover { border-color: var(--accent); }
  .msg-file svg { width: 18px; height: 18px; fill: var(--accent2); flex-shrink: 0; }
  .welcome-msg { text-align: center; padding: 48px 20px; color: var(--muted); }
  .welcome-msg .icon { font-size: 40px; margin-bottom: 12px; }
  .welcome-msg h3 { font-size: 17px; font-weight: 600; color: var(--text); margin-bottom: 6px; }

  /* ── 輸入框 ── */
  .input-area { padding: 16px 24px 20px; background: var(--bg); }
  .upload-preview { display: flex; align-items: center; gap: 8px; background: var(--bg3); border: 1px solid var(--border); border-radius: 10px; padding: 8px 12px; margin-bottom: 8px; font-size: 13px; }
  .upload-preview .pname { flex: 1; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .upload-preview .pcancel { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 16px; padding: 0 2px; }
  .upload-bar { height: 3px; background: var(--accent); border-radius: 2px; transition: width .3s; margin-bottom: 8px; }
  .input-box { background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius); display: flex; align-items: center; gap: 8px; padding: 4px 4px 4px 12px; transition: border-color .2s; }
  .input-box:focus-within { border-color: var(--accent); }
  .input-box input { flex: 1; background: none; border: none; font-size: 14px; font-family: var(--font); color: var(--text); outline: none; padding: 8px 0; }
  .input-box input::placeholder { color: var(--muted); }
  .attach-btn { background: none; border: none; color: var(--muted); cursor: pointer; padding: 6px; border-radius: 8px; display: flex; align-items: center; transition: color .2s; }
  .attach-btn:hover { color: var(--accent2); }
  .attach-btn svg { width: 18px; height: 18px; fill: currentColor; }
  .send-btn { background: var(--accent); border: none; border-radius: 10px; width: 38px; height: 38px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background .2s; flex-shrink: 0; }
  .send-btn:hover { background: var(--accent2); }
  .send-btn:disabled { opacity: .4; cursor: not-allowed; }
  .send-btn svg { width: 18px; height: 18px; fill: #fff; }
  .input-hint { font-size: 11px; color: var(--muted); margin-top: 8px; padding-left: 4px; }

  /* ── Modal ── */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; z-index: 200; backdrop-filter: blur(4px); }
  .modal { background: var(--bg2); border: 1px solid var(--border); border-radius: 18px; padding: 36px 32px; width: 360px; }
  .modal h2 { font-size: 18px; font-weight: 700; margin-bottom: 6px; }
  .modal p { font-size: 13px; color: var(--muted); margin-bottom: 24px; }
  .modal-btns { display: flex; gap: 10px; margin-top: 20px; }
  .btn-secondary { flex: 1; background: var(--bg3); color: var(--text); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 11px; font-size: 14px; font-family: var(--font); cursor: pointer; }
  .btn-secondary:hover { background: var(--border); }
  .btn-modal-ok { flex: 1; background: var(--accent); color: #fff; border: none; border-radius: var(--radius-sm); padding: 11px; font-size: 14px; font-weight: 600; font-family: var(--font); cursor: pointer; }
  .btn-modal-ok:hover { background: var(--accent2); }
  .opt-tag { font-size: 11px; color: var(--muted); margin-left: 4px; }
  .err-msg { color: var(--danger); font-size: 13px; margin-top: -8px; margin-bottom: 8px; }
  .no-room { flex: 1; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 12px; color: var(--muted); }

  /* ── 燈箱 ── */
  .lightbox { position: fixed; inset: 0; background: rgba(0,0,0,0.88); display: flex; align-items: center; justify-content: center; z-index: 300; cursor: zoom-out; }
  .lightbox img { max-width: 90vw; max-height: 90vh; border-radius: 12px; }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>

<!-- 登入 -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo"><svg viewBox="0 0 24 24"><path d="M20 2H4a2 2 0 00-2 2v18l4-4h14a2 2 0 002-2V4a2 2 0 00-2-2z"/></svg></div>
    <h1>加入聊天室</h1>
    <p>輸入你的暱稱即可開始聊天，無需註冊帳號</p>
    <div class="field"><label>你的暱稱</label><input type="text" id="username-input" placeholder="例：小明、阿華..." maxlength="16" autocomplete="off"></div>
    <button class="btn-primary" onclick="joinChat()">進入聊天室 →</button>
  </div>
</div>

<!-- 建立聊天室 Modal -->
<div id="create-modal" class="modal-overlay" style="display:none">
  <div class="modal">
    <h2>建立新聊天室</h2>
    <p>建立後所有人都能在側欄看到這個聊天室</p>
    <div class="field"><label>聊天室名稱</label><input type="text" id="new-room-name" placeholder="例：工作討論、遊戲組..." maxlength="20" autocomplete="off"></div>
    <div class="field"><label>房間密碼 <span class="opt-tag">（選填，留空則公開）</span></label><input type="password" id="new-room-pwd" placeholder="設定密碼以保護此聊天室" maxlength="20"></div>
    <div class="modal-btns">
      <button class="btn-secondary" onclick="closeCreateModal()">取消</button>
      <button class="btn-modal-ok" onclick="createRoom()">建立</button>
    </div>
  </div>
</div>

<!-- 輸入密碼 Modal -->
<div id="pwd-modal" class="modal-overlay" style="display:none">
  <div class="modal">
    <h2>🔒 需要密碼</h2>
    <p id="pwd-modal-desc">此聊天室已設定密碼保護</p>
    <div class="field"><label>房間密碼</label><input type="password" id="room-pwd-input" placeholder="輸入密碼..." maxlength="20"></div>
    <div id="pwd-error" class="err-msg" style="display:none">密碼錯誤，請再試一次</div>
    <div class="modal-btns">
      <button class="btn-secondary" onclick="closePwdModal()">取消</button>
      <button class="btn-modal-ok" onclick="submitPwd()">進入</button>
    </div>
  </div>
</div>

<!-- 主畫面 -->
<div id="app">
  <div class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo"><svg viewBox="0 0 24 24"><path d="M20 2H4a2 2 0 00-2 2v18l4-4h14a2 2 0 002-2V4a2 2 0 00-2-2z"/></svg></div>
      <span class="sidebar-title">即時聊天室</span>
    </div>
    <div class="sidebar-section">
      <span>聊天室</span>
      <button class="add-room-btn" onclick="openCreateModal()" title="建立新聊天室">+</button>
    </div>
    <div id="room-list"></div>
    <div class="sidebar-footer">
      <div class="avatar" id="user-avatar"></div>
      <div><div class="user-name" id="user-display"></div><div class="user-tag">線上中</div></div>
      <button class="logout-btn" onclick="logout()" title="登出">
        <svg viewBox="0 0 24 24" width="17" height="17" fill="currentColor"><path d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5-5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z"/></svg>
      </button>
    </div>
  </div>

  <div class="chat-area">
    <div id="no-room-state" class="no-room">
      <svg viewBox="0 0 24 24" width="48" height="48" fill="var(--muted2)"><path d="M20 2H4a2 2 0 00-2 2v18l4-4h14a2 2 0 002-2V4a2 2 0 00-2-2z"/></svg>
      <p>請從左側選擇一個聊天室</p>
    </div>
    <div id="chat-view" style="display:none;flex-direction:column;height:100%">
      <div class="chat-header">
        <span class="chat-header-hash">#</span>
        <span class="chat-header-name" id="room-name-display"></span>
        <span id="room-lock-icon" style="font-size:14px;margin-left:2px;color:var(--muted)"></span>
      </div>
      <div class="messages" id="messages"></div>
      <div class="input-area">
        <div id="upload-preview" style="display:none" class="upload-preview">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="var(--accent2)"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8l-6-6zm4 18H6V4h7v5h5v11z"/></svg>
          <span class="pname" id="upload-fname"></span>
          <button class="pcancel" onclick="cancelUpload()">✕</button>
        </div>
        <div id="upload-bar-wrap" style="display:none"><div class="upload-bar" id="upload-bar" style="width:0%"></div></div>
        <div class="input-box">
          <button class="attach-btn" onclick="document.getElementById('file-input').click()" title="傳送圖片或檔案">
            <svg viewBox="0 0 24 24"><path d="M16.5 6v11.5c0 2.21-1.79 4-4 4s-4-1.79-4-4V5a2.5 2.5 0 015 0v10.5c0 .83-.67 1.5-1.5 1.5s-1.5-.67-1.5-1.5V6H9v9.5a3.5 3.5 0 007 0V5c0-2.76-2.24-5-5-5S6 2.24 6 5v12.5c0 3.87 3.13 7 7 7s7-3.13 7-7V6h-3.5z"/></svg>
          </button>
          <input type="file" id="file-input" style="display:none" accept="image/*,.pdf,.doc,.docx,.txt,.zip" onchange="handleFile(this)">
          <input type="text" id="msg-input" placeholder="輸入訊息..." maxlength="500" autocomplete="off">
          <button class="send-btn" id="send-btn" onclick="sendMessage()">
            <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
          </button>
        </div>
        <div class="input-hint">按 Enter 發送・📎 可傳送圖片和檔案（最大 10MB）</div>
      </div>
    </div>
  </div>
</div>

<script>
// ════════════════════════════════════════════
//  ⚙️  填入你的 Supabase 設定
// ════════════════════════════════════════════
const SUPABASE_URL = 'https://wyekwxjycsdcsajdtgua.supabase.co';
const SUPABASE_KEY = 'sb_publishable_Xab8eToEyd2-Z4q4QXvWCQ_3zpN1Fng';
// ════════════════════════════════════════════

const { createClient } = supabase;
let sb, currentUser, currentRoomId, currentRoomName, realtimeChannel;
let pendingRoom = null, selectedFile = null;

function init() {
  if (SUPABASE_URL.includes('你的')) { alert('請先填入 Supabase 設定！'); return; }
  sb = createClient(SUPABASE_URL, SUPABASE_KEY);
  const saved = sessionStorage.getItem('chat_username');
  if (saved) enterApp(saved);
}

// ── 登入 ──
function joinChat() {
  const name = document.getElementById('username-input').value.trim();
  if (!name) { alert('請輸入暱稱！'); return; }
  sessionStorage.setItem('chat_username', name);
  enterApp(name);
}

function enterApp(name) {
  currentUser = name;
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').classList.add('show');
  document.getElementById('user-display').textContent = name;
  const av = document.getElementById('user-avatar');
  av.textContent = name[0].toUpperCase();
  av.style.background = strToColor(name);
  loadRooms();
}

function logout() {
  sessionStorage.removeItem('chat_username');
  if (realtimeChannel) sb.removeChannel(realtimeChannel);
  location.reload();
}

// ── 聊天室列表 ──
async function loadRooms() {
  const { data } = await sb.from('rooms').select('*').order('created_at');
  const list = document.getElementById('room-list');
  list.innerHTML = '';
  (data || []).forEach(room => {
    const el = document.createElement('div');
    el.className = 'room-item';
    el.dataset.id = room.id;
    el.dataset.pwd = room.password || '';
    el.innerHTML = `<span class="room-hash">#</span><span>${escHtml(room.name)}</span>${room.password ? '<span class="room-lock">🔒</span>' : ''}`;
    el.onclick = () => tryEnterRoom(room);
    list.appendChild(el);
  });
  if (data && data.length > 0) tryEnterRoom(data[0]);
}

// ── 密碼保護 ──
function tryEnterRoom(room) {
  if (room.password) {
    const cached = sessionStorage.getItem('unlocked_' + room.id);
    if (cached === room.password) { enterRoom(room.id, room.name); return; }
    pendingRoom = room;
    document.getElementById('pwd-modal-desc').textContent = `「${room.name}」已設定密碼保護`;
    document.getElementById('room-pwd-input').value = '';
    document.getElementById('pwd-error').style.display = 'none';
    document.getElementById('pwd-modal').style.display = 'flex';
    setTimeout(() => document.getElementById('room-pwd-input').focus(), 100);
  } else {
    enterRoom(room.id, room.name);
  }
}

function submitPwd() {
  const val = document.getElementById('room-pwd-input').value;
  if (val === pendingRoom.password) {
    sessionStorage.setItem('unlocked_' + pendingRoom.id, pendingRoom.password);
    closePwdModal();
    enterRoom(pendingRoom.id, pendingRoom.name);
  } else {
    document.getElementById('pwd-error').style.display = 'block';
    document.getElementById('room-pwd-input').value = '';
    document.getElementById('room-pwd-input').focus();
  }
}

function closePwdModal() { document.getElementById('pwd-modal').style.display = 'none'; pendingRoom = null; }

// ── 建立聊天室 ──
function openCreateModal() {
  document.getElementById('new-room-name').value = '';
  document.getElementById('new-room-pwd').value = '';
  document.getElementById('create-modal').style.display = 'flex';
  setTimeout(() => document.getElementById('new-room-name').focus(), 100);
}

function closeCreateModal() { document.getElementById('create-modal').style.display = 'none'; }

async function createRoom() {
  const name = document.getElementById('new-room-name').value.trim();
  const pwd = document.getElementById('new-room-pwd').value.trim();
  if (!name) { alert('請輸入聊天室名稱！'); return; }
  const { data, error } = await sb.from('rooms').insert({ name, password: pwd || null }).select().single();
  if (error) { alert('建立失敗：' + error.message); return; }
  closeCreateModal();
  if (pwd) sessionStorage.setItem('unlocked_' + data.id, pwd);
  await loadRooms();
  enterRoom(data.id, data.name);
}

// ── 進入聊天室 ──
async function enterRoom(roomId, roomName) {
  currentRoomId = roomId; currentRoomName = roomName;
  document.querySelectorAll('.room-item').forEach(el => el.classList.toggle('active', el.dataset.id === roomId));
  document.getElementById('no-room-state').style.display = 'none';
  const cv = document.getElementById('chat-view');
  cv.style.display = 'flex';
  document.getElementById('room-name-display').textContent = roomName;
  const roomEl = document.querySelector(`.room-item[data-id="${roomId}"]`);
  document.getElementById('room-lock-icon').textContent = roomEl && roomEl.dataset.pwd ? '🔒' : '';
  document.getElementById('messages').innerHTML = '';
  if (realtimeChannel) await sb.removeChannel(realtimeChannel);
  await loadHistory(roomId);
  realtimeChannel = sb.channel('messages-' + roomId, {
    config: { broadcast: { self: true } }
  })
    .on('postgres_changes', {
      event: 'INSERT',
      schema: 'public',
      table: 'messages',
      filter: `room_id=eq.${roomId}`
    }, payload => appendMessage(payload.new, true))
    .subscribe((status) => {
      console.log('Realtime status:', status);
    });
  document.getElementById('msg-input').focus();
}

// ── 歷史訊息 ──
async function loadHistory(roomId) {
  const { data } = await sb.from('messages').select('*').eq('room_id', roomId).order('created_at', { ascending: true }).limit(80);
  const container = document.getElementById('messages');
  if (!data || data.length === 0) {
    container.innerHTML = `<div class="welcome-msg"><div class="icon">💬</div><h3>#${escHtml(currentRoomName)}</h3><p>這是聊天室的開始，成為第一個發言的人吧！</p></div>`;
    return;
  }
  data.forEach(msg => appendMessage(msg, false));
  scrollToBottom();
}

// ── 顯示訊息 ──
function appendMessage(msg, animate) {
  const container = document.getElementById('messages');
  const welcome = container.querySelector('.welcome-msg');
  if (welcome) welcome.remove();
  const isMe = msg.username === currentUser;
  const time = new Date(msg.created_at).toLocaleTimeString('zh-Hant', { hour: '2-digit', minute: '2-digit' });
  const color = strToColor(msg.username);

  let contentHtml = '';
  if (msg.file_url) {
    const isImage = /\.(jpg|jpeg|png|gif|webp)(\?|$)/i.test(msg.file_url);
    if (isImage) {
      contentHtml = `<img class="msg-image" src="${escHtml(msg.file_url)}" alt="圖片" onclick="openLightbox('${escHtml(msg.file_url)}')">`;
    } else {
      contentHtml = `<a class="msg-file" href="${escHtml(msg.file_url)}" target="_blank">
        <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8l-6-6zm4 18H6V4h7v5h5v11z"/></svg>
        ${escHtml(msg.file_name || '檔案')}</a>`;
    }
  }
  if (msg.content) contentHtml += `<div class="msg-text">${escHtml(msg.content)}</div>`;

  const row = document.createElement('div');
  row.className = 'msg-row';
  row.innerHTML = `
    <div class="msg-avatar" style="background:${color}">${escHtml(msg.username[0].toUpperCase())}</div>
    <div class="msg-body">
      <div class="msg-header">
        <span class="msg-name ${isMe ? 'is-me' : ''}">${escHtml(msg.username)}</span>
        <span class="msg-time">${time}</span>
      </div>
      ${contentHtml}
    </div>`;
  if (!animate) row.style.animation = 'none';
  container.appendChild(row);
  if (animate) scrollToBottom();
}

// ── 發送訊息 ──
async function sendMessage() {
  const input = document.getElementById('msg-input');
  const content = input.value.trim();
  if (!content && !selectedFile) return;
  if (!currentRoomId) return;
  const btn = document.getElementById('send-btn');
  btn.disabled = true;
  input.value = '';
  let file_url = null, file_name = null;
  if (selectedFile) {
    const res = await uploadFile(selectedFile);
    if (!res) { btn.disabled = false; return; }
    file_url = res.url; file_name = res.name;
    cancelUpload();
  }
  await sb.from('messages').insert({ room_id: currentRoomId, username: currentUser, content: content || null, file_url, file_name });
  btn.disabled = false;
  input.focus();
}

// ── 檔案上傳 ──
function handleFile(input) {
  const file = input.files[0];
  if (!file) return;
  if (file.size > 10 * 1024 * 1024) { alert('檔案大小不能超過 10MB'); input.value = ''; return; }
  selectedFile = file;
  document.getElementById('upload-fname').textContent = file.name;
  document.getElementById('upload-preview').style.display = 'flex';
  input.value = '';
}

function cancelUpload() {
  selectedFile = null;
  document.getElementById('upload-preview').style.display = 'none';
  document.getElementById('upload-bar-wrap').style.display = 'none';
  document.getElementById('upload-bar').style.width = '0%';
}

async function uploadFile(file) {
  const ext = file.name.split('.').pop();
  const path = `${Date.now()}_${Math.random().toString(36).slice(2)}.${ext}`;
  document.getElementById('upload-bar-wrap').style.display = 'block';
  document.getElementById('upload-bar').style.width = '40%';
  const { error } = await sb.storage.from('chat-files').upload(path, file);
  if (error) { alert('上傳失敗：' + error.message); document.getElementById('upload-bar-wrap').style.display = 'none'; return null; }
  document.getElementById('upload-bar').style.width = '100%';
  const { data } = sb.storage.from('chat-files').getPublicUrl(path);
  return { url: data.publicUrl, name: file.name };
}

// ── 燈箱 ──
function openLightbox(url) {
  const lb = document.createElement('div');
  lb.className = 'lightbox';
  lb.innerHTML = `<img src="${escHtml(url)}" alt="圖片預覽">`;
  lb.onclick = () => lb.remove();
  document.body.appendChild(lb);
}

// ── 工具 ──
function scrollToBottom() { const el = document.getElementById('messages'); setTimeout(() => { el.scrollTop = el.scrollHeight; }, 50); }
function escHtml(str) { if (!str) return ''; return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function strToColor(str) {
  const c = ['#5b6af0','#e05fa0','#f0955b','#3dd68c','#f0d45b','#5bc8f0','#a05bf0','#f05b5b'];
  let h = 0; for (let i = 0; i < str.length; i++) h = str.charCodeAt(i) + ((h << 5) - h);
  return c[Math.abs(h) % c.length];
}

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('msg-input').addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } });
  document.getElementById('username-input').addEventListener('keydown', e => { if (e.key === 'Enter') joinChat(); });
  document.getElementById('new-room-name').addEventListener('keydown', e => { if (e.key === 'Enter') createRoom(); });
  document.getElementById('room-pwd-input').addEventListener('keydown', e => { if (e.key === 'Enter') submitPwd(); });
  init();
});
</script>
