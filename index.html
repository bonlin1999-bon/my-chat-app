<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0d0f14">
<title>即時聊天室</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --bg:#0d0f14; --bg2:#13161e; --bg3:#1e2235;
  --border:#252a38; --accent:#5b6af0; --accent2:#7c89ff;
  --ag:rgba(91,106,240,0.15);
  --text:#e8eaf2; --muted:#6b7394; --muted2:#3d4260;
  --green:#3dd68c; --red:#f06292;
  --me:#5b6af0; --me-t:#fff;
  --other:#1e2235; --other-t:#e8eaf2;
  --font:'Noto Sans TC',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{font-family:var(--font);background:var(--bg);color:var(--text);display:flex;height:100dvh}

/* ══ 載入畫面 ══ */
#loading-screen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:200;flex-direction:column;gap:16px}
.loading-logo{width:56px;height:56px;background:var(--accent);border-radius:16px;display:flex;align-items:center;justify-content:center}
.loading-logo svg{width:28px;height:28px;fill:#fff}
.loading-text{font-size:14px;color:var(--muted)}
.loading-dots::after{content:'';animation:dots 1.2s steps(3,end) infinite}
@keyframes dots{0%{content:''}33%{content:'.'}66%{content:'..'}100%{content:'...'}}

/* ══ 登入 ══ */
#login-screen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px}
.lcard{background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:40px 32px;width:100%;max-width:360px}
.llogo{width:48px;height:48px;background:var(--accent);border-radius:14px;display:flex;align-items:center;justify-content:center;margin-bottom:20px}
.llogo svg{width:24px;height:24px;fill:#fff}
.lcard h1{font-size:22px;font-weight:700;margin-bottom:6px}
.lcard p{font-size:13px;color:var(--muted);margin-bottom:28px;line-height:1.6}
.field{margin-bottom:14px}
.field label{display:block;font-size:11px;font-weight:600;color:var(--muted);margin-bottom:7px;letter-spacing:.05em;text-transform:uppercase}
.field input{width:100%;background:var(--bg3);border:1.5px solid var(--border);border-radius:10px;padding:12px 14px;font-size:15px;font-family:var(--font);color:var(--text);outline:none;transition:border-color .2s}
.field input:focus{border-color:var(--accent)}
.btn-p{width:100%;background:var(--accent);color:#fff;border:none;border-radius:10px;padding:13px;font-size:15px;font-weight:600;font-family:var(--font);cursor:pointer;margin-top:6px;transition:opacity .15s}
.btn-p:active{opacity:.8}

/* ══ 主畫面 ══ */
#app{display:none;width:100%;height:100%}
#app.show{display:flex}

/* ══ 側欄遮罩 ══ */
#sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:40;backdrop-filter:blur(2px)}
#sidebar-overlay.show{display:block}

/* ══ 側欄 ══ */
.sidebar{width:260px;min-width:260px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;height:100%;transition:transform .25s ease;position:relative;z-index:50}
.sb-head{padding:16px 14px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.sb-logo{width:30px;height:30px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sb-logo svg{width:15px;height:15px;fill:#fff}
.sb-title{font-size:14px;font-weight:700;flex:1}
.close-sb{display:none;background:none;border:none;color:var(--muted);cursor:pointer;padding:4px;font-size:22px;line-height:1}
.sb-section{padding:12px 12px 6px;font-size:10px;font-weight:600;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;display:flex;align-items:center;justify-content:space-between}
.add-btn{background:none;border:none;color:var(--muted);cursor:pointer;width:22px;height:22px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:20px;line-height:1;padding-bottom:2px;transition:color .2s,background .2s}
.add-btn:hover{color:var(--accent2);background:var(--ag)}
.room-item{margin:2px 8px;padding:10px 12px;border-radius:8px;cursor:pointer;display:flex;align-items:center;gap:8px;font-size:14px;transition:background .15s;user-select:none}
.room-item:hover{background:var(--bg3)}
.room-item.active{background:var(--ag);color:var(--accent2)}
.r-hash{color:var(--muted);font-size:16px;font-weight:300}
.room-item.active .r-hash{color:var(--accent2)}
.r-lock{font-size:12px;margin-left:auto}
.sb-foot{margin-top:auto;border-top:1px solid var(--border);padding:12px 14px;display:flex;align-items:center;gap:10px}
.av{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;position:relative}
.av::after{content:'';position:absolute;bottom:1px;right:1px;width:9px;height:9px;border-radius:50%;background:var(--green);border:2px solid var(--bg2)}
.u-name{font-size:13px;font-weight:500}
.u-tag{font-size:11px;color:var(--muted)}
.logout-btn{margin-left:auto;background:none;border:none;color:var(--muted);cursor:pointer;padding:4px;border-radius:6px;display:flex;transition:color .2s}
.logout-btn:hover{color:var(--red)}

/* ══ 聊天區 ══ */
.chat-area{flex:1;display:flex;flex-direction:column;height:100%;overflow:hidden;min-width:0}
.chat-head{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;background:var(--bg);flex-shrink:0}
.menu-btn{display:none;background:none;border:none;color:var(--muted);cursor:pointer;padding:4px;margin-right:2px}
.menu-btn svg{width:20px;height:20px;fill:currentColor}
.ch-hash{font-size:18px;color:var(--muted);font-weight:300}
.ch-name{font-size:15px;font-weight:600;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.notif-btn{background:none;border:none;cursor:pointer;padding:6px;border-radius:8px;color:var(--muted);transition:color .2s,background .2s;display:flex;align-items:center}
.notif-btn:hover{color:var(--accent2);background:var(--ag)}
.notif-btn svg{width:18px;height:18px;fill:currentColor}
.notif-btn.on{color:var(--accent2)}

/* ══ 訊息 ══ */
.messages{flex:1;overflow-y:auto;padding:16px 14px;display:flex;flex-direction:column;gap:6px;scroll-behavior:smooth}
.messages::-webkit-scrollbar{width:4px}
.messages::-webkit-scrollbar-thumb{background:var(--muted2);border-radius:4px}
.msg-row{display:flex;align-items:flex-end;gap:8px;max-width:100%}
.msg-row.me{flex-direction:row-reverse}
.msg-av{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:12px;font-size:12px;font-weight:700;flex-shrink:0}
.msg-row.me .msg-av{display:none}
.msg-col{display:flex;flex-direction:column;max-width:72%;min-width:0}
.msg-row.me .msg-col{align-items:flex-end}
.msg-meta{font-size:11px;color:var(--muted);margin-bottom:3px;display:flex;align-items:center;gap:6px}
.msg-row.me .msg-meta{flex-direction:row-reverse}
.msg-uname{font-weight:600;font-size:12px}
.bubble{padding:10px 14px;border-radius:18px;word-break:break-word;font-size:14px;line-height:1.55;position:relative}
.msg-row.other .bubble{background:var(--other);color:var(--other-t);border-bottom-left-radius:4px}
.msg-row.me .bubble{background:var(--me);color:var(--me-t);border-bottom-right-radius:4px}
.bubble-img{max-width:220px;max-height:220px;border-radius:14px;display:block;cursor:zoom-in;object-fit:cover}
.msg-row.me .bubble-img{border-bottom-right-radius:4px}
.msg-row.other .bubble-img{border-bottom-left-radius:4px}
.bubble-file{display:inline-flex;align-items:center;gap:8px;text-decoration:none;font-size:13px}
.msg-row.me .bubble-file{color:rgba(255,255,255,.9)}
.msg-row.other .bubble-file{color:var(--other-t)}
.bubble-file svg{width:16px;height:16px;fill:currentColor;flex-shrink:0}
.date-divider{text-align:center;font-size:11px;color:var(--muted);margin:10px 0;display:flex;align-items:center;gap:8px}
.date-divider::before,.date-divider::after{content:'';flex:1;height:1px;background:var(--border)}
.welcome-msg{text-align:center;padding:48px 20px;color:var(--muted);margin:auto}
.welcome-msg .icon{font-size:40px;margin-bottom:12px}
.welcome-msg h3{font-size:17px;font-weight:600;color:var(--text);margin-bottom:6px}
.welcome-msg p{font-size:13px;line-height:1.6}
.no-room{flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;color:var(--muted)}

/* ══ 輸入框 ══ */
.input-area{padding:10px 14px 14px;background:var(--bg);flex-shrink:0}
.upload-preview{display:flex;align-items:center;gap:8px;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:8px 12px;margin-bottom:8px;font-size:13px}
.upload-preview .pname{flex:1;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.upload-preview .pcancel{background:none;border:none;color:var(--muted);cursor:pointer;font-size:16px;padding:0 2px}
.upload-bar-wrap{margin-bottom:6px}
.upload-bar{height:3px;background:var(--accent);border-radius:2px;transition:width .3s}
.ibox{background:var(--bg3);border:1.5px solid var(--border);border-radius:24px;display:flex;align-items:center;gap:6px;padding:4px 4px 4px 14px;transition:border-color .2s}
.ibox:focus-within{border-color:var(--accent)}
.ibox input{flex:1;background:none;border:none;font-size:15px;font-family:var(--font);color:var(--text);outline:none;padding:8px 0;min-width:0}
.ibox input::placeholder{color:var(--muted)}
.ibox-btn{background:none;border:none;color:var(--muted);cursor:pointer;padding:8px;border-radius:50%;display:flex;align-items:center;transition:color .2s;flex-shrink:0}
.ibox-btn:hover{color:var(--accent2)}
.ibox-btn svg{width:19px;height:19px;fill:currentColor}
.send-btn{background:var(--accent);border:none;border-radius:50%;width:40px;height:40px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:opacity .15s}
.send-btn:active{opacity:.8}
.send-btn:disabled{opacity:.4;cursor:not-allowed}
.send-btn svg{width:18px;height:18px;fill:#fff;margin-left:2px}
.input-hint{font-size:11px;color:var(--muted);margin-top:6px;padding-left:6px}

/* ══ Modal ══ */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);display:flex;align-items:flex-end;justify-content:center;z-index:200;backdrop-filter:blur(4px);padding:0}
@media(min-width:600px){.modal-overlay{align-items:center;padding:20px}}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:20px 20px 0 0;padding:28px 24px 32px;width:100%;max-width:400px}
@media(min-width:600px){.modal{border-radius:20px}}
.modal h2{font-size:18px;font-weight:700;margin-bottom:6px}
.modal p{font-size:13px;color:var(--muted);margin-bottom:22px;line-height:1.5}
.modal-btns{display:flex;gap:10px;margin-top:18px}
.btn-s{flex:1;background:var(--bg3);color:var(--text);border:1px solid var(--border);border-radius:10px;padding:12px;font-size:14px;font-family:var(--font);cursor:pointer}
.btn-ok{flex:1;background:var(--accent);color:#fff;border:none;border-radius:10px;padding:12px;font-size:14px;font-weight:600;font-family:var(--font);cursor:pointer}
.opt-tag{font-size:11px;color:var(--muted);margin-left:4px}
.err-msg{color:var(--red);font-size:12px;margin-top:-8px;margin-bottom:10px}

/* ══ 燈箱 ══ */
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,.9);display:flex;align-items:center;justify-content:center;z-index:300;cursor:zoom-out;padding:20px}
.lightbox img{max-width:100%;max-height:100%;border-radius:12px;object-fit:contain}

/* ══ Toast ══ */
.toast{position:fixed;top:16px;left:50%;transform:translateX(-50%);background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:10px 18px;font-size:13px;color:var(--text);z-index:400;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.4);animation:toastIn .3s ease}
@keyframes toastIn{from{opacity:0;transform:translateY(-8px) translateX(-50%)}to{opacity:1;transform:translateY(0) translateX(-50%)}}

/* ══ 手機版 ══ */
@media(max-width:640px){
  .sidebar{position:fixed;left:0;top:0;height:100%;transform:translateX(-100%);z-index:50}
  .sidebar.open{transform:translateX(0)}
  .close-sb{display:block}
  .menu-btn{display:flex}
  .chat-area{width:100%}
  .msg-col{max-width:82%}
}
@keyframes msgIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.msg-row{animation:msgIn .2s ease}
</style>
</head>
<body>

<!-- 載入畫面 -->
<div id="loading-screen">
  <div class="loading-logo"><svg viewBox="0 0 24 24"><path d="M20 2H4a2 2 0 00-2 2v18l4-4h14a2 2 0 002-2V4a2 2 0 00-2-2z"/></svg></div>
  <div class="loading-text loading-dots">載入中</div>
</div>

<!-- 登入 -->
<div id="login-screen" style="display:none">
  <div class="lcard">
    <div class="llogo"><svg viewBox="0 0 24 24"><path d="M20 2H4a2 2 0 00-2 2v18l4-4h14a2 2 0 002-2V4a2 2 0 00-2-2z"/></svg></div>
    <h1>加入聊天室</h1>
    <p>輸入你的暱稱即可開始聊天，無需註冊帳號</p>
    <div class="field"><label>你的暱稱</label><input type="text" id="username-input" placeholder="例：小明、阿華..." maxlength="16" autocomplete="off"></div>
    <button class="btn-p" onclick="joinChat()">進入聊天室 →</button>
  </div>
</div>

<!-- 建立聊天室 Modal -->
<div id="create-modal" class="modal-overlay" style="display:none">
  <div class="modal">
    <h2>建立新聊天室</h2>
    <p>建立後所有人都能在側欄看到這個聊天室</p>
    <div class="field"><label>聊天室名稱</label><input type="text" id="new-room-name" placeholder="例：工作討論、遊戲組..." maxlength="20" autocomplete="off"></div>
    <div class="field"><label>房間密碼 <span class="opt-tag">（選填）</span></label><input type="password" id="new-room-pwd" placeholder="留空則公開" maxlength="20"></div>
    <div class="modal-btns">
      <button class="btn-s" onclick="closeCreateModal()">取消</button>
      <button class="btn-ok" onclick="createRoom()">建立</button>
    </div>
  </div>
</div>

<!-- 密碼 Modal -->
<div id="pwd-modal" class="modal-overlay" style="display:none">
  <div class="modal">
    <h2>🔒 需要密碼</h2>
    <p id="pwd-modal-desc">此聊天室已設定密碼保護</p>
    <div class="field"><label>房間密碼</label><input type="password" id="room-pwd-input" placeholder="輸入密碼..." maxlength="20"></div>
    <div id="pwd-error" class="err-msg" style="display:none">密碼錯誤，請再試一次</div>
    <div class="modal-btns">
      <button class="btn-s" onclick="closePwdModal()">取消</button>
      <button class="btn-ok" onclick="submitPwd()">進入</button>
    </div>
  </div>
</div>

<!-- 側欄遮罩 -->
<div id="sidebar-overlay" onclick="closeSidebar()"></div>

<!-- 主畫面 -->
<div id="app">
  <div class="sidebar" id="sidebar">
    <div class="sb-head">
      <div class="sb-logo"><svg viewBox="0 0 24 24"><path d="M20 2H4a2 2 0 00-2 2v18l4-4h14a2 2 0 002-2V4a2 2 0 00-2-2z"/></svg></div>
      <span class="sb-title">即時聊天室</span>
      <button class="close-sb" onclick="closeSidebar()">✕</button>
    </div>
    <div class="sb-section">
      <span>聊天室</span>
      <button class="add-btn" onclick="openCreateModal()" title="建立新聊天室">+</button>
    </div>
    <div id="room-list"></div>
    <div class="sb-foot">
      <div class="av" id="user-avatar"></div>
      <div><div class="u-name" id="user-display"></div><div class="u-tag">線上中</div></div>
      <button class="logout-btn" onclick="logout()" title="登出">
        <svg viewBox="0 0 24 24" width="17" height="17" fill="currentColor"><path d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5-5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z"/></svg>
      </button>
    </div>
  </div>

  <div class="chat-area">
    <div id="no-room-state" class="no-room">
      <svg viewBox="0 0 24 24" width="48" height="48" fill="var(--muted2)"><path d="M20 2H4a2 2 0 00-2 2v18l4-4h14a2 2 0 002-2V4a2 2 0 00-2-2z"/></svg>
      <p>請從左側選擇一個聊天室</p>
    </div>
    <div id="chat-view" style="display:none;flex-direction:column;height:100%">
      <div class="chat-head">
        <button class="menu-btn" onclick="openSidebar()">
          <svg viewBox="0 0 24 24"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg>
        </button>
        <span class="ch-hash">#</span>
        <span class="ch-name" id="room-name-display"></span>
        <span id="room-lock-icon" style="font-size:14px;color:var(--muted)"></span>
        <button class="notif-btn" id="notif-btn" onclick="toggleNotif()" title="開啟通知">
          <svg id="notif-icon" viewBox="0 0 24 24"><path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2zm6-6v-5c0-3.07-1.64-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.63 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/></svg>
        </button>
      </div>
      <div class="messages" id="messages"></div>
      <div class="input-area">
        <div id="upload-preview" style="display:none" class="upload-preview">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="var(--accent2)"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8l-6-6zm4 18H6V4h7v5h5v11z"/></svg>
          <span class="pname" id="upload-fname"></span>
          <button class="pcancel" onclick="cancelUpload()">✕</button>
        </div>
        <div id="upload-bar-wrap" style="display:none" class="upload-bar-wrap"><div class="upload-bar" id="upload-bar" style="width:0%"></div></div>
        <div class="ibox">
          <button class="ibox-btn" onclick="document.getElementById('file-input').click()" title="傳送圖片或檔案">
            <svg viewBox="0 0 24 24"><path d="M16.5 6v11.5c0 2.21-1.79 4-4 4s-4-1.79-4-4V5a2.5 2.5 0 015 0v10.5c0 .83-.67 1.5-1.5 1.5s-1.5-.67-1.5-1.5V6H9v9.5a3.5 3.5 0 007 0V5c0-2.76-2.24-5-5-5S6 2.24 6 5v12.5c0 3.87 3.13 7 7 7s7-3.13 7-7V6h-3.5z"/></svg>
          </button>
          <input type="file" id="file-input" style="display:none" accept="image/*,.pdf,.doc,.docx,.txt,.zip" onchange="handleFile(this)">
          <input type="text" id="msg-input" placeholder="輸入訊息..." maxlength="500" autocomplete="off">
          <button class="send-btn" id="send-btn" onclick="sendMessage()">
            <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
          </button>
        </div>
        <div class="input-hint">按 Enter 發送・📎 傳送圖片／檔案（最大 10MB）</div>
      </div>
    </div>
  </div>
</div>

<script>
const { createClient } = supabase;
let sb, currentUser, currentRoomId, currentRoomName, realtimeChannel;
let pendingRoom = null, selectedFile = null, notifEnabled = false;

// ── 啟動：從 API 取得設定 ──
async function init() {
  try {
    const res = await fetch('/api/config');
    const { url, key } = await res.json();
    if (!url || !key) throw new Error('設定不完整');
    sb = createClient(url, key);
    document.getElementById('loading-screen').style.display = 'none';
    const saved = sessionStorage.getItem('chat_username');
    if (saved) { enterApp(saved); }
    else { document.getElementById('login-screen').style.display = 'flex'; }
  } catch (e) {
    document.querySelector('.loading-text').textContent = '載入失敗，請重新整理';
    console.error(e);
  }
}

// ── 側欄 ──
function openSidebar() { document.getElementById('sidebar').classList.add('open'); document.getElementById('sidebar-overlay').classList.add('show'); }
function closeSidebar() { document.getElementById('sidebar').classList.remove('open'); document.getElementById('sidebar-overlay').classList.remove('show'); }

// ── 登入 ──
function joinChat() {
  const name = document.getElementById('username-input').value.trim();
  if (!name) { alert('請輸入暱稱！'); return; }
  sessionStorage.setItem('chat_username', name);
  enterApp(name);
}

function enterApp(name) {
  currentUser = name;
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').classList.add('show');
  document.getElementById('user-display').textContent = name;
  const av = document.getElementById('user-avatar');
  av.textContent = name[0].toUpperCase();
  av.style.background = strToColor(name);
  loadRooms();
}

function logout() { sessionStorage.removeItem('chat_username'); if (realtimeChannel) sb.removeChannel(realtimeChannel); location.reload(); }

// ── 通知 ──
async function toggleNotif() {
  if (notifEnabled) { notifEnabled = false; updateNotifBtn(); showToast('通知已關閉'); return; }
  if (!('Notification' in window)) { showToast('此瀏覽器不支援通知'); return; }
  const perm = await Notification.requestPermission();
  if (perm === 'granted') { notifEnabled = true; updateNotifBtn(); showToast('通知已開啟 🔔'); }
  else { showToast('請在瀏覽器設定中允許通知'); }
}

function updateNotifBtn() {
  document.getElementById('notif-btn').classList.toggle('on', notifEnabled);
}

function sendNotif(msg) {
  if (!notifEnabled || Notification.permission !== 'granted') return;
  if (document.visibilityState === 'visible') return;
  if (msg.username === currentUser) return;
  new Notification(`${msg.username}：`, {
    body: msg.content || (msg.file_name ? `傳送了檔案：${msg.file_name}` : '傳送了圖片'),
    tag: 'chat-msg'
  });
}

function showToast(text) {
  const old = document.querySelector('.toast');
  if (old) old.remove();
  const t = document.createElement('div');
  t.className = 'toast'; t.textContent = text;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2500);
}

// ── 聊天室列表 ──
async function loadRooms() {
  const { data } = await sb.from('rooms').select('*').order('created_at');
  const list = document.getElementById('room-list');
  list.innerHTML = '';
  (data || []).forEach(room => {
    const el = document.createElement('div');
    el.className = 'room-item';
    el.dataset.id = room.id;
    el.dataset.pwd = room.password || '';
    el.innerHTML = `<span class="r-hash">#</span><span>${escHtml(room.name)}</span>${room.password ? '<span class="r-lock">🔒</span>' : ''}`;
    el.onclick = () => { tryEnterRoom(room); closeSidebar(); };
    list.appendChild(el);
  });
  if (data && data.length > 0 && !currentRoomId) tryEnterRoom(data[0]);
}

// ── 密碼保護 ──
function tryEnterRoom(room) {
  if (room.password) {
    const cached = sessionStorage.getItem('unlocked_' + room.id);
    if (cached === room.password) { enterRoom(room.id, room.name, true); return; }
    pendingRoom = room;
    document.getElementById('pwd-modal-desc').textContent = `「${room.name}」已設定密碼保護`;
    document.getElementById('room-pwd-input').value = '';
    document.getElementById('pwd-error').style.display = 'none';
    document.getElementById('pwd-modal').style.display = 'flex';
    setTimeout(() => document.getElementById('room-pwd-input').focus(), 100);
  } else { enterRoom(room.id, room.name, true); }
}

function submitPwd() {
  const val = document.getElementById('room-pwd-input').value;
  if (val === pendingRoom.password) {
    sessionStorage.setItem('unlocked_' + pendingRoom.id, pendingRoom.password);
    closePwdModal(); enterRoom(pendingRoom.id, pendingRoom.name, true);
  } else {
    document.getElementById('pwd-error').style.display = 'block';
    document.getElementById('room-pwd-input').value = '';
    document.getElementById('room-pwd-input').focus();
  }
}

function closePwdModal() { document.getElementById('pwd-modal').style.display = 'none'; pendingRoom = null; }

// ── 建立聊天室 ──
function openCreateModal() {
  document.getElementById('new-room-name').value = '';
  document.getElementById('new-room-pwd').value = '';
  document.getElementById('create-modal').style.display = 'flex';
  setTimeout(() => document.getElementById('new-room-name').focus(), 100);
}
function closeCreateModal() { document.getElementById('create-modal').style.display = 'none'; }

async function createRoom() {
  const name = document.getElementById('new-room-name').value.trim();
  const pwd = document.getElementById('new-room-pwd').value.trim();
  if (!name) { alert('請輸入聊天室名稱！'); return; }
  const { data, error } = await sb.from('rooms').insert({ name, password: pwd || null }).select().single();
  if (error) { alert('建立失敗：' + error.message); return; }
  closeCreateModal();
  if (pwd) sessionStorage.setItem('unlocked_' + data.id, pwd);
  await loadRooms();
  enterRoom(data.id, data.name, true);
}

// ── 進入聊天室 ──
async function enterRoom(roomId, roomName, skipCheck) {
  currentRoomId = roomId; currentRoomName = roomName;
  document.querySelectorAll('.room-item').forEach(el => el.classList.toggle('active', el.dataset.id === roomId));
  document.getElementById('no-room-state').style.display = 'none';
  document.getElementById('chat-view').style.display = 'flex';
  document.getElementById('room-name-display').textContent = roomName;
  const roomEl = document.querySelector(`.room-item[data-id="${roomId}"]`);
  document.getElementById('room-lock-icon').textContent = roomEl && roomEl.dataset.pwd ? '🔒' : '';
  document.getElementById('messages').innerHTML = '';
  if (realtimeChannel) await sb.removeChannel(realtimeChannel);
  await loadHistory(roomId);
  realtimeChannel = sb.channel('messages-' + roomId, { config: { broadcast: { self: true } } })
    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages', filter: `room_id=eq.${roomId}` },
      payload => { appendMessage(payload.new, true); sendNotif(payload.new); })
    .subscribe(status => console.log('Realtime:', status));
  document.getElementById('msg-input').focus();
}

// ── 歷史訊息 ──
async function loadHistory(roomId) {
  const { data } = await sb.from('messages').select('*').eq('room_id', roomId).order('created_at', { ascending: true }).limit(80);
  const container = document.getElementById('messages');
  if (!data || data.length === 0) {
    container.innerHTML = `<div class="welcome-msg"><div class="icon">💬</div><h3>#${escHtml(currentRoomName)}</h3><p>這是聊天室的開始，成為第一個發言的人吧！</p></div>`;
    return;
  }
  let lastDate = '';
  data.forEach(msg => {
    const d = new Date(msg.created_at).toLocaleDateString('zh-Hant', { month: 'long', day: 'numeric' });
    if (d !== lastDate) { lastDate = d; addDateDivider(d); }
    appendMessage(msg, false);
  });
  scrollToBottom();
}

function addDateDivider(text) {
  const d = document.createElement('div');
  d.className = 'date-divider'; d.textContent = text;
  document.getElementById('messages').appendChild(d);
}

// ── 顯示訊息 ──
function appendMessage(msg, animate) {
  const container = document.getElementById('messages');
  const welcome = container.querySelector('.welcome-msg');
  if (welcome) welcome.remove();
  const isMe = msg.username === currentUser;
  const time = new Date(msg.created_at).toLocaleTimeString('zh-Hant', { hour: '2-digit', minute: '2-digit' });
  const color = strToColor(msg.username);

  let bubbleContent = '';
  if (msg.file_url) {
    const isImage = /\.(jpg|jpeg|png|gif|webp)(\?|$)/i.test(msg.file_url);
    if (isImage) {
      bubbleContent = `<img class="bubble-img" src="${escHtml(msg.file_url)}" alt="圖片" onclick="openLightbox('${escHtml(msg.file_url)}')">`;
    } else {
      bubbleContent = `<a class="bubble-file" href="${escHtml(msg.file_url)}" target="_blank">
        <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8l-6-6zm4 18H6V4h7v5h5v11z"/></svg>
        ${escHtml(msg.file_name || '檔案')}</a>`;
    }
  }
  if (msg.content) bubbleContent += (bubbleContent ? '<br>' : '') + escHtml(msg.content);

  const row = document.createElement('div');
  row.className = `msg-row ${isMe ? 'me' : 'other'}`;
  row.innerHTML = `
    <div class="msg-av" style="background:${color};justify-content:center">${escHtml(msg.username[0].toUpperCase())}</div>
    <div class="msg-col">
      <div class="msg-meta">
        ${!isMe ? `<span class="msg-uname" style="color:${color}">${escHtml(msg.username)}</span>` : ''}
        <span>${time}</span>
      </div>
      <div class="bubble">${bubbleContent}</div>
    </div>`;
  if (!animate) row.style.animation = 'none';
  container.appendChild(row);
  if (animate) scrollToBottom();
}

// ── 發送訊息 ──
async function sendMessage() {
  const input = document.getElementById('msg-input');
  const content = input.value.trim();
  if (!content && !selectedFile) return;
  if (!currentRoomId) return;
  if (!sb) { showToast('連線中，請稍後再試'); return; }
  const btn = document.getElementById('send-btn');
  btn.disabled = true; input.value = '';
  let file_url = null, file_name = null;
  if (selectedFile) {
    const res = await uploadFile(selectedFile);
    if (!res) { btn.disabled = false; return; }
    file_url = res.url; file_name = res.name; cancelUpload();
  }
  await sb.from('messages').insert({ room_id: currentRoomId, username: currentUser, content: content || null, file_url, file_name });
  btn.disabled = false; input.focus();
}

// ── 檔案上傳 ──
function handleFile(input) {
  const file = input.files[0];
  if (!file) return;
  if (file.size > 10 * 1024 * 1024) { alert('檔案大小不能超過 10MB'); input.value = ''; return; }
  selectedFile = file;
  document.getElementById('upload-fname').textContent = file.name;
  document.getElementById('upload-preview').style.display = 'flex';
  input.value = '';
}

function cancelUpload() {
  selectedFile = null;
  document.getElementById('upload-preview').style.display = 'none';
  document.getElementById('upload-bar-wrap').style.display = 'none';
  document.getElementById('upload-bar').style.width = '0%';
}

async function uploadFile(file) {
  const ext = file.name.split('.').pop();
  const path = `${Date.now()}_${Math.random().toString(36).slice(2)}.${ext}`;
  document.getElementById('upload-bar-wrap').style.display = 'block';
  document.getElementById('upload-bar').style.width = '40%';
  const { error } = await sb.storage.from('chat-files').upload(path, file);
  if (error) { alert('上傳失敗：' + error.message); document.getElementById('upload-bar-wrap').style.display = 'none'; return null; }
  document.getElementById('upload-bar').style.width = '100%';
  const { data } = sb.storage.from('chat-files').getPublicUrl(path);
  return { url: data.publicUrl, name: file.name };
}

// ── 燈箱 ──
function openLightbox(url) {
  const lb = document.createElement('div');
  lb.className = 'lightbox';
  lb.innerHTML = `<img src="${escHtml(url)}" alt="圖片預覽">`;
  lb.onclick = () => lb.remove();
  document.body.appendChild(lb);
}

// ── 工具 ──
function scrollToBottom() { const el = document.getElementById('messages'); setTimeout(() => { el.scrollTop = el.scrollHeight; }, 50); }
function escHtml(str) { if (!str) return ''; return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function strToColor(str) {
  const c = ['#5b6af0','#e05fa0','#f0955b','#3dd68c','#f0c95b','#5bc8f0','#a05bf0','#f05b5b'];
  let h = 0; for (let i = 0; i < str.length; i++) h = str.charCodeAt(i) + ((h << 5) - h);
  return c[Math.abs(h) % c.length];
}

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('msg-input').addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } });
  document.getElementById('username-input').addEventListener('keydown', e => { if (e.key === 'Enter') joinChat(); });
  document.getElementById('new-room-name').addEventListener('keydown', e => { if (e.key === 'Enter') createRoom(); });
  document.getElementById('room-pwd-input').addEventListener('keydown', e => { if (e.key === 'Enter') submitPwd(); });
  init();
});
</script>
